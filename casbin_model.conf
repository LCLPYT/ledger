[request_definition]
r = sub, obj, act, scope

[policy_definition]
p = sub, obj, act

[role_definition]
g = _, _

[policy_effect]
e = some(where (p.eft == allow))

[matchers]
# User must have the permission (via role or direct)
# The requested action (obj.act) must match the token's scope
m = g(r.sub, p.sub) && keyMatch(r.obj, p.obj) && keyMatch(r.act, p.act) && \
    keyMatch(r.obj + "." + r.act, r.scope)

openapi: 3.0.3
info:
  title: Ledger API
  version: 0.1.0

servers:
  - url: http://localhost:8080
    description: Local development server

security:
  - bearerAuth: []

paths:
  /status:
    get:
      summary: Health check
      security: []
      responses:
        "200":
          description: Service is healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok

  /api/v1/user/login:
    post:
      summary: Login and obtain a session token
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: JWT session token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TokenResponse"
        "400":
          $ref: "#/components/responses/BadRequest"

  /api/v1/user/session/refresh:
    post:
      summary: Refresh the current session token
      description: Issues a new 1-hour session token. Call when the existing token is close to expiry. Only available in session context.
      responses:
        "200":
          description: New session token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TokenResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /api/v1/user/tokens:
    get:
      summary: List the authenticated user's access tokens
      responses:
        "200":
          description: List of access tokens
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AccessToken"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /api/v1/user/tokens/{id}:
    delete:
      summary: Revoke an access token
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
          example: 7
      responses:
        "200":
          description: Token revoked
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Message"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/v1/user/token:
    post:
      summary: Create a named access token with a subset of the user's scopes
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TokenRequest"
      responses:
        "200":
          description: Newly created token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TokenResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /api/v1/users:
    get:
      summary: List all users
      responses:
        "200":
          description: List of users
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/User"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
    post:
      summary: Invite a new user (admin)
      description: Creates a shell user and sends a verification email with a link to set their password.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateUserRequest"
      responses:
        "201":
          description: User created and invite email sent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "409":
          $ref: "#/components/responses/Conflict"

  /api/v1/users/{id}:
    delete:
      summary: Delete a user
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: User deleted
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/v1/auth/verify-invitation:
    post:
      summary: Verify invitation and set password
      description: Validates the invitation token and sets the user's password, activating the account.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VerifyInvitationRequest"
      responses:
        "200":
          description: Password set, account activated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Message"
        "400":
          $ref: "#/components/responses/BadRequest"

  /api/v1/user/password:
    put:
      summary: Change password
      description: Changes the authenticated user's password. Requires a session token. Revokes all active sessions on success.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChangePasswordRequest"
      responses:
        "200":
          description: Password changed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Message"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /api/v1/user/username:
    put:
      summary: Change username
      description: Updates the authenticated user's username. Requires a session token and current password confirmation.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateUsernameRequest"
      responses:
        "200":
          description: Username updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  username:
                    type: string
                    example: newname
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "409":
          $ref: "#/components/responses/Conflict"

  /api/v1/user/email:
    put:
      summary: Change email
      description: Updates the authenticated user's email address. Requires a session token and current password confirmation.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateEmailRequest"
      responses:
        "200":
          description: Email updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  email:
                    type: string
                    format: email
                    example: new@example.com
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "409":
          $ref: "#/components/responses/Conflict"

  /api/v1/roles:
    get:
      summary: List all roles with their members
      responses:
        "200":
          description: List of roles
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/RoleWithMembers"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
    post:
      summary: Create a new role
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateRoleRequest"
      responses:
        "201":
          description: Role created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Role"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "409":
          $ref: "#/components/responses/Conflict"

  /api/v1/roles/{role}:
    delete:
      summary: Delete a role (protected roles cannot be deleted)
      parameters:
        - name: role
          in: path
          required: true
          schema:
            type: string
          example: myrole
      responses:
        "200":
          description: Role deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Message"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/v1/roles/{role}/permissions:
    get:
      summary: List permissions assigned to a role
      parameters:
        - name: role
          in: path
          required: true
          schema:
            type: string
          example: admin
      responses:
        "200":
          description: List of permission strings
          content:
            application/json:
              schema:
                type: array
                items:
                  type: string
                example: ["user.read", "users.read"]
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
    post:
      summary: Add a permission to a role
      parameters:
        - name: role
          in: path
          required: true
          schema:
            type: string
          example: admin
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RolePermissionRequest"
      responses:
        "200":
          description: Permission added
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Message"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "409":
          $ref: "#/components/responses/Conflict"
    delete:
      summary: Remove a permission from a role
      parameters:
        - name: role
          in: path
          required: true
          schema:
            type: string
          example: admin
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RolePermissionRequest"
      responses:
        "200":
          description: Permission removed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Message"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/v1/roles/{role}/users:
    post:
      summary: Add a user to a role
      parameters:
        - name: role
          in: path
          required: true
          schema:
            type: string
          example: default
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RoleUserRequest"
      responses:
        "200":
          description: User added to role
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Message"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
    delete:
      summary: Remove a user from a role
      parameters:
        - name: role
          in: path
          required: true
          schema:
            type: string
          example: default
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RoleUserRequest"
      responses:
        "200":
          description: User removed from role
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Message"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/v1/players:
    get:
      summary: List Minecraft players with their coin balances
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
            maximum: 200
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
      responses:
        "200":
          description: List of players
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/MinecraftPlayer"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /api/v1/players/{uuid}/coins:
    get:
      summary: Get a player's current coin balance
      parameters:
        - name: uuid
          in: path
          required: true
          schema:
            type: string
            format: uuid
          example: 069a79f4-44e9-4726-a5be-fca90e38aaf5
      responses:
        "200":
          description: Player balance
          content:
            application/json:
              schema:
                type: object
                properties:
                  balance:
                    type: integer
                    format: int64
                    example: 1500
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/v1/players/{uuid}/coins/transactions:
    get:
      summary: List coin transactions for a player
      parameters:
        - name: uuid
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
            maximum: 200
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
      responses:
        "200":
          description: List of transactions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CoinTransaction"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/v1/players/{uuid}/coins/award:
    post:
      summary: Award coins to a player (auto-creates player if unknown)
      parameters:
        - name: uuid
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AwardCoinsRequest"
      responses:
        "200":
          description: New balance after award
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BalanceResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /api/v1/players/{uuid}/coins/spend:
    post:
      summary: Deduct coins from a player (fails if balance insufficient)
      parameters:
        - name: uuid
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SpendCoinsRequest"
      responses:
        "200":
          description: New balance after spend
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BalanceResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          description: Insufficient balance
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/v1/players/{uuid}/coins/adjust:
    post:
      summary: Adjust a player's balance by a signed amount (admin)
      parameters:
        - name: uuid
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdjustCoinsRequest"
      responses:
        "200":
          description: New balance after adjustment
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BalanceResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "422":
          description: Insufficient balance
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/v1/user/permissions:
    get:
      summary: Get the current user's effective permissions
      security:
        - bearerAuth: []
      responses:
        "200":
          description: List of effective permission strings
          content:
            application/json:
              schema:
                type: object
                properties:
                  permissions:
                    type: array
                    items:
                      type: string
                    example: ["user.read", "users.read", "roles.read"]
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /api/v1/user:
    get:
      summary: Get the authenticated user's profile
      responses:
        "200":
          description: User profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    LoginRequest:
      type: object
      required: [identifier, password]
      properties:
        identifier:
          type: string
          description: Username or email address
          example: alice
        password:
          type: string
          format: password
          example: hunter2

    TokenRequest:
      type: object
      required: [name, scopes, expiry]
      properties:
        name:
          type: string
          example: ci-token
        scopes:
          type: array
          items:
            type: string
            pattern: '^\w+\.\w+$'
          example: ["user.read"]
        expiry:
          type: string
          format: date-time
          example: "2027-01-01T00:00:00Z"

    TokenResponse:
      type: object
      properties:
        token:
          type: string
          example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...

    User:
      type: object
      properties:
        id:
          type: integer
          format: int64
          example: 1
        username:
          type: string
          example: alice
        email:
          type: string
          format: email
          example: alice@example.com
        created:
          type: string
          format: date-time

    CreateUserRequest:
      type: object
      required: [username, email]
      properties:
        username:
          type: string
          example: jsmith
        email:
          type: string
          format: email
          example: j@example.com

    VerifyInvitationRequest:
      type: object
      required: [token, password]
      properties:
        token:
          type: string
          example: a3f2...
        password:
          type: string
          format: password
          minLength: 8
          example: hunter2hunter2

    ChangePasswordRequest:
      type: object
      required: [current_password, new_password]
      properties:
        current_password:
          type: string
          format: password
          example: OldP@ss1word
        new_password:
          type: string
          format: password
          minLength: 8
          example: NewP@ss1word

    UpdateUsernameRequest:
      type: object
      required: [username, current_password]
      properties:
        username:
          type: string
          example: newname
        current_password:
          type: string
          format: password
          example: MyP@ss1word

    UpdateEmailRequest:
      type: object
      required: [email, current_password]
      properties:
        email:
          type: string
          format: email
          example: new@example.com
        current_password:
          type: string
          format: password
          example: MyP@ss1word

    CreateRoleRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string
          example: admin

    AccessToken:
      type: object
      properties:
        id:
          type: integer
          format: int64
          example: 7
        name:
          type: string
          example: ci-token
        created_at:
          type: string
          format: date-time
        expires_at:
          type: string
          format: date-time
        revoked:
          type: boolean
          example: false
        scopes:
          type: array
          items:
            type: string
          example: ["user.read"]

    RolePermissionRequest:
      type: object
      required: [permission]
      properties:
        permission:
          type: string
          pattern: '^\w+\.\w+$'
          example: users.read

    Role:
      type: object
      properties:
        id:
          type: integer
          format: int64
          example: 1
        name:
          type: string
          example: admin
        created_at:
          type: string
          format: date-time
        protected:
          type: boolean
          example: false

    RoleWithMembers:
      allOf:
        - $ref: "#/components/schemas/Role"
        - type: object
          properties:
            members:
              type: array
              items:
                type: string
              description: User IDs assigned to this role
              example: ["1", "42"]

    RoleUserRequest:
      type: object
      required: [user_id]
      properties:
        user_id:
          type: string
          example: "42"

    MinecraftPlayer:
      type: object
      properties:
        id:
          type: integer
          format: int64
          example: 1
        uuid:
          type: string
          format: uuid
          example: 069a79f4-44e9-4726-a5be-fca90e38aaf5
        username:
          type: string
          nullable: true
          example: Notch
        balance:
          type: integer
          format: int64
          example: 1500
        created_at:
          type: string
          format: date-time

    CoinTransaction:
      type: object
      properties:
        id:
          type: integer
          format: int64
          example: 42
        player_id:
          type: integer
          format: int64
          example: 1
        amount:
          type: integer
          format: int64
          description: Positive for awards, negative for spends
          example: 100
        source:
          type: string
          enum: [minigame, admin, purchase, system]
          example: minigame
        description:
          type: string
          nullable: true
          example: "Placed 1st in SkyWars"
        created_at:
          type: string
          format: date-time
        actor_user_id:
          type: integer
          format: int64
          nullable: true
          example: 3
        actor_token_id:
          type: integer
          format: int64
          nullable: true
          example: 7

    AwardCoinsRequest:
      type: object
      required: [amount, source]
      properties:
        amount:
          type: integer
          format: int64
          minimum: 1
          example: 100
        source:
          type: string
          enum: [minigame, admin, purchase, system]
          example: minigame
        description:
          type: string
          nullable: true
          example: "Placed 1st in SkyWars"

    SpendCoinsRequest:
      type: object
      required: [amount, source]
      properties:
        amount:
          type: integer
          format: int64
          minimum: 1
          example: 50
        source:
          type: string
          enum: [minigame, admin, purchase, system]
          example: purchase
        description:
          type: string
          nullable: true
          example: "Bought cosmetic hat"

    AdjustCoinsRequest:
      type: object
      required: [amount, source]
      properties:
        amount:
          type: integer
          format: int64
          description: Positive to add, negative to deduct
          example: -25
        source:
          type: string
          enum: [minigame, admin, purchase, system]
          example: admin
        description:
          type: string
          nullable: true
          example: "Manual correction"

    BalanceResponse:
      type: object
      properties:
        balance:
          type: integer
          format: int64
          example: 1450

    Message:
      type: object
      properties:
        message:
          type: string
          example: user added to role

    Error:
      type: object
      properties:
        error:
          type: string
          example: unauthorized

  responses:
    BadRequest:
      description: Invalid request body or parameters
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    Unauthorized:
      description: Missing or invalid authentication token
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    Forbidden:
      description: Token does not have the required scope
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    Conflict:
      description: Resource already exists
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
# docker services for development

services:
  postgres:
    image: postgres:18-alpine
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql
    environment:
      POSTGRES_PASSWORD: db
      POSTGRES_DB: db
      POSTGRES_USER: db
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U db -d db" ]
      interval: 1s
      timeout: 5s
      retries: 20

volumes:
  pgdata:
